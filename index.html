<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sottosuolo,23</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #CC0000;
    --fg: #0a0a0a;
    --fg-dim: rgba(10,10,10,0.42);
    --bg: #f5f2ee;
    --border: rgba(10,10,10,0.11);
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    z-index: 100;
  }

  .nav-logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
    color: var(--fg);
    text-decoration: none;
    font-style: italic;
  }
  .nav-logo .red { color: var(--red); font-style: normal; }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }
  .nav-links a {
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-dim);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--fg); }

  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 3rem 5rem;
    min-height: 100vh;
  }

  .hero-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(4.5rem, 13vw, 13rem);
    line-height: 0.92;
    letter-spacing: -0.02em;
    color: var(--fg);
    margin-bottom: 0.15em;
    opacity: 0;
    transform: translateY(40px);
    animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }
  .hero-title .comma { color: var(--red); }
  .hero-title .num {
    font-size: 0.62em;
    position: relative;
    top: -0.08em;
  }

  .hero-sub {
    display: flex;
    align-items: flex-start;
    gap: 2rem;
    opacity: 0;
    transform: translateY(20px);
    animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards;
  }

  .accent-bar {
    width: 3px;
    height: 4.5rem;
    background: var(--red);
    flex-shrink: 0;
    margin-top: 0.3rem;
  }

  .tagline {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1rem, 2.4vw, 1.55rem);
    line-height: 1.4;
    color: var(--fg-dim);
  }

  .hero-footer {
    margin-top: 4rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: fade 1s ease 1s forwards;
  }

  .location-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg-dim);
  }

  .cta-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid var(--red);
    padding-bottom: 2px;
    transition: color 0.3s;
  }
  .cta-link:hover { color: var(--red); }

  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes fade { to { opacity: 1; } }

  @media (max-width: 640px) {
    nav { padding: 1.5rem; }
    .nav-links { gap: 1.5rem; }
    .nav-links a { font-size: 0.58rem; }
    .hero { padding: 0 1.5rem 4rem; }
    .accent-bar { height: 3.5rem; }
    .hero-footer { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">S<span class="red">,</span>23</a>
  <ul class="nav-links">
    <li><a href="#">Work</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<main class="hero">
  <div>
    <h1 class="hero-title">Sottosuolo<span class="comma">,</span><span class="num">23</span></h1>
    <div class="hero-sub">
      <div class="accent-bar"></div>
      <p class="tagline">
        a contemporary physical theatre collective<br>
        and performance ensemble
      </p>
    </div>
    <div class="hero-footer">
      <span class="location-label">Milano &nbsp;·&nbsp; Est. 2023</span>
      <a href="#" class="cta-link">Discover our work</a>
    </div>
  </div>
</main>

</body>
</html>
