<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sottosuolo,23 — About</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #CC0000;
    --fg: #0a0a0a;
    --fg-dim: rgba(10,10,10,0.42);
    --bg: #f5f2ee;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: Georgia, 'Times New Roman', serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    z-index: 100;
  }

  .nav-logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
    color: var(--fg);
    text-decoration: none;
    font-style: italic;
  }
  .nav-logo .red { color: var(--red); font-style: normal; }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }
  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-dim);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--fg); }
  .nav-links a.active { color: var(--fg); }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 8rem 3rem 5rem;
    position: relative;
    min-height: 100vh;
  }

  /* Names block */
  .names-block {
    border-left: 2.5px solid var(--red);
    padding-left: 1.5rem;
    opacity: 0;
    transform: translateY(20px);
    animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }

  .names-block ul {
    list-style: none;
  }

  .names-block li {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 1.6vw, 1.25rem);
    line-height: 1.75;
    color: var(--fg-dim);
    letter-spacing: 0.01em;
  }

  /* Giant comma */
  .big-comma {
    position: absolute;
    bottom: 4rem;
    right: 3rem;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(12rem, 20vw, 22rem);
    line-height: 1;
    color: var(--red);
    user-select: none;
    opacity: 0;
    animation: fade 1.2s ease 0.5s forwards;
  }

  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes fade { to { opacity: 1; } }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    nav { padding: 1.5rem; }
    .nav-links { gap: 1.5rem; }
    .nav-links a { font-size: 0.58rem; }
    main { padding: 7rem 1.5rem 4rem; }
    .big-comma {
      right: 1.5rem;
      bottom: 2rem;
      font-size: clamp(8rem, 35vw, 14rem);
    }
  }
</style>
</head>
<body>

<nav>
  <a href="sottosuolo23.html" class="nav-logo">S<span class="red">,</span>23</a>
  <ul class="nav-links">
    <li><a href="sottosuolo23.html">Work</a></li>
    <li><a href="#" class="active">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="names-block">
    <ul>
      <li>antonia</li>
      <li>carlotta</li>
      <li>daniele</li>
      <li>elisa</li>
      <li>ema</li>
      <li>francesco b</li>
      <li>francesco d</li>
      <li>michele</li>
      <li>monique</li>
      <li>nathalie</li>
      <li>ortensia</li>
      <li>stella</li>
    </ul>
  </div>

  <div class="big-comma">,</div>
</main>

</body>
</html>
